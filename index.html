<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guardian Control | Focus Pilot</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #ff003c; text-align: center; width: 300px; }
        input { width: 80%; padding: 10px; margin: 20px 0; background: #222; border: 1px solid #444; color: #fff; text-align: center; font-size: 1.5rem; letter-spacing: 5px; }
        button { background: #ff003c; color: #fff; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        #unlock-btn { background: #00ff88; color: #000; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #ff003c;">GUARDIAN LOCK</h2>
        <p>Set a 4-digit PIN to lock your friend's browser.</p>
        <input type="password" id="pin" maxlength="4" placeholder="****">
        <button id="lock-btn">SET LOCK</button>
        <button id="unlock-btn">UNLOCK NOW</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const binId = params.get('id') || '07fbb68e8699db5dc69f';
        const url = `https://api.npoint.io/${binId}`;

        const lockBtn = document.getElementById('lock-btn');
        const unlockBtn = document.getElementById('unlock-btn');
        const pinInput = document.getElementById('pin');

        lockBtn.onclick = async () => {
            const pin = pinInput.value;
            if(pin.length !== 4) return alert("৪ ডিজিট পিন দাও মামা!");
            
            await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: 'LOCKED', pin: pin })
            });
            alert("লক হয়ে গেছে!");
            lockBtn.style.display = 'none';
            unlockBtn.style.display = 'block';
        };

        unlockBtn.onclick = async () => {
            const pin = pinInput.value;
            const res = await fetch(url);
            const data = await res.json();
            if(pin === data.pin) {
                await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ status: 'UNLOCKED', pin: "" })
                });
                alert("আনলকড!");
                location.reload();
            } else { alert("ভুল পিন!"); }
        };
    </script>
</body>
</html>
