<!-- এই HTML টা কপি করে guardian.html নামে সেভ করো -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Guardian PIN Setup</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #333; }
        input {
            width: 100%;
            padding: 15px;
            font-size: 32px;
            text-align: center;
            letter-spacing: 8px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin: 20px 0;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        .site-list {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛡️ Guardian PIN Setup</h1>
        <p>Your friend needs your help to stay focused</p>
        
        <div class="site-list" id="siteList">Loading sites...</div>
        
        <input type="text" id="pin" maxlength="4" placeholder="****">
        <button id="setPin">Set PIN & Lock Sites</button>
        <div id="message"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        
        document.getElementById('setPin').onclick = () => {
            const pin = document.getElementById('pin').value;
            if (pin && pin.length === 4) {
                // এখানে তোর এক্সটেনশনে মেসেজ পাঠাবে
                alert('PIN Set: ' + pin + '\nSites are now locked!');
                
                // এক্সটেনশনে পাঠানোর কোড
                if (typeof browser !== 'undefined') {
                    browser.runtime.sendMessage({
                        action: 'setGuardianPin',
                        id: id,
                        pin: pin
                    });
                }
            }
        };
    </script>
</body>
</html>
