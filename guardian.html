<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Mode | Focus Pilot Pro</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --danger: #ef4444;
            --success: #10b981;
            --bg: #070b14;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #070b14);
            color: white;
            font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Background 3D Glow */
        body::before {
            content: "";
            position: absolute;
            width: 350px;
            height: 350px;
            background: var(--primary);
            filter: blur(160px);
            border-radius: 50%;
            top: -120px;
            left: -120px;
            opacity: 0.25;
            z-index: -1;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 45px;
            border-radius: 28px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7), 
                        inset 0 0 25px rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(139, 92, 246, 0.2);
            transform: perspective(1000px) rotateX(1deg);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: perspective(1000px) rotateX(0deg) translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #c4b5fd, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 35px;
        }

        input {
            width: 100%;
            padding: 20px 0;
            font-size: 36px;
            text-align: center;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid #334155;
            color: white;
            border-radius: 18px;
            letter-spacing: 18px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            outline: none;
            font-weight: bold;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
            background: rgba(15, 23, 42, 0.8);
        }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
        }

        button:active {
            transform: scale(0.97);
        }

        #lockBtn {
            background: linear-gradient(45deg, #ef4444, #991b1b);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        #lockBtn:hover {
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.5);
            filter: brightness(1.15);
        }

        #unlockBtn {
            background: linear-gradient(45deg, #10b981, #065f46);
            color: white;
            display: none;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        #unlockBtn:hover {
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
            filter: brightness(1.15);
        }

        #message {
            margin-top: 25px;
            font-size: 14px;
            min-height: 20px;
            font-weight: 500;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
        }

        .is-locked .status-dot {
            background: var(--danger);
            box-shadow: 0 0 12px var(--danger);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .loading-spinner {
            display: none;
            margin: 20px auto;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes shake {
            0%, 100% { transform: perspective(1000px) translateX(0); }
            20%, 60% { transform: perspective(1000px) translateX(-8px); }
            40%, 80% { transform: perspective(1000px) translateX(8px); }
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h1 id="headerTitle">🛡️ Guardian Mode</h1>
        <p id="instruction">Secure your browsing. Set a 4-digit PIN to activate the lock.</p>
        
        <div class="input-group">
            <input type="password" id="pin" maxlength="4" placeholder="••••">
        </div>

        <button id="lockBtn">🔒 ACTIVATE LOCK</button>
        <button id="unlockBtn">🔓 AUTHORIZE UNLOCK</button>

        <div id="loading" class="loading-spinner"></div>
        <div id="message"></div>
    </div>

    <script>
        // API Configuration - Static BIN_ID as requested
        const BIN_ID = '07fbb68e8699db5dc69f';
        const API_URL = `https://api.npoint.io/${BIN_ID}`;

        const lockBtn = document.getElementById('lockBtn');
        const unlockBtn = document.getElementById('unlockBtn');
        const pinInput = document.getElementById('pin');
        const message = document.getElementById('message');
        const loading = document.getElementById('loading');
        const instruction = document.getElementById('instruction');
        const mainCard = document.getElementById('mainCard');

        // Initial status check
        async function checkStatus() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if (data.status === 'LOCKED') {
                    setUILocked();
                }
            } catch (e) { console.error("Network check failed"); }
        }

        function setUILocked() {
            lockBtn.style.display = 'none';
            unlockBtn.style.display = 'block';
            mainCard.classList.add('is-locked');
            instruction.innerHTML = '<span class="status-dot"></span> System is currently PROTECTED';
            instruction.style.color = "#f87171";
            document.getElementById('headerTitle').innerText = "🛡️ System Locked";
        }

        checkStatus();

        // Lock Logic
        lockBtn.onclick = async () => {
            const pin = pinInput.value;
            if (pin.length !== 4) {
                showMsg("Required: 4-digit PIN", "#fbbf24");
                return;
            }

            toggleLoading(true);
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'LOCKED', pin: pin })
                });
                if(response.ok) {
                    showMsg("✅ Guardian Activated!", "#10b981");
                    setTimeout(() => location.reload(), 1500);
                }
            } catch (e) {
                showMsg("Sync failed! Please try again.", "#ef4444");
            } finally { toggleLoading(false); }
        };

        // Unlock Logic
        unlockBtn.onclick = async () => {
            const pin = pinInput.value;
            if (!pin) {
                showMsg("Enter PIN to verify identity", "#fbbf24");
                return;
            }

            toggleLoading(true);
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if (pin === data.pin) {
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: 'UNLOCKED', pin: "" })
                    });
                    showMsg("✅ Identity Verified. Unlocked!", "#10b981");
                    setTimeout(() => location.reload(), 1500);
                } else {
                    showMsg("Access Denied! Incorrect PIN.", "#ef4444");
                    mainCard.style.animation = "shake 0.4s ease";
                    setTimeout(() => mainCard.style.animation = "", 400);
                }
            } catch (e) {
                showMsg("Connection Error!", "#ef4444");
            } finally { toggleLoading(false); }
        };

        function showMsg(txt, color) {
            message.innerText = txt;
            message.style.color = color;
        }

        function toggleLoading(show) {
            loading.style.display = show ? 'block' : 'none';
            if (show) message.innerText = "";
        }

        // Numerical input only
        pinInput.oninput = (e) => { e.target.value = e.target.value.replace(/[^0-9]/g, ''); };
    </script>
</body>
</html>
