<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Guardian | Focus Pilot Pro</title>
    <style>
        :root {
            --primary: #00f2ff; /* Cyan Neon */
            --secondary: #7000ff; /* Purple Neon */
            --bg: #050810;
            --card-bg: rgba(10, 15, 28, 0.8);
            --danger: #ff0055;
            --success: #00ffaa;
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Animated Grid Background */
        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(circle, black, transparent 80%);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 30px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 242, 255, 0.05);
            position: relative;
            transition: 0.4s;
        }

        .card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 60px rgba(0, 242, 255, 0.15);
        }

        .user-badge {
            background: rgba(0, 242, 255, 0.1);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid var(--primary);
            text-transform: uppercase;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #8a99af;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 20px 0;
            font-size: 35px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: var(--primary);
            border-radius: 15px;
            letter-spacing: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #lockBtn {
            background: linear-gradient(45deg, #7000ff, #00f2ff);
            color: white;
        }

        #lockBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(112, 0, 255, 0.4);
        }

        #unlockBtn {
            background: var(--success);
            color: #050810;
            display: none;
        }

        #message {
            margin-top: 25px;
            font-weight: 600;
            min-height: 20px;
        }

        /* Loading Animation */
        .loader {
            display: none;
            width: 25px;
            height: 25px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 15px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div class="card" id="card">
        <div id="userBadge" class="user-badge">Link ID: Loading...</div>
        <h1 id="title">Remote Guardian</h1>
        <p id="desc">Secure the connected browser remotely with a 4-digit PIN.</p>

        <div class="input-wrapper">
            <input type="password" id="pin" maxlength="4" placeholder="••••">
        </div>

        <div class="btn-group">
            <button id="lockBtn">🔒 Establish Remote Lock</button>
            <button id="unlockBtn">🔓 Authorize Unlock</button>
        </div>

        <div class="loader" id="loader"></div>
        <div id="message"></div>
    </div>

    <script>
        // 1. Get User ID from URL (e.g. guardian.html?id=user_123)
        const params = new URLSearchParams(window.location.search);
        const USER_ID = params.get('id');
        
        // npoint endpoint with your bin ID
        const API_BASE = 'https://api.npoint.io/07fbb68e8699db5dc69f';
        const userBadge = document.getElementById('userBadge');

        if (!USER_ID) {
            document.getElementById('card').innerHTML = "<h1>Link Invalid</h1><p>User ID is missing. Please use a valid link from the Focus Pilot extension.</p>";
        } else {
            userBadge.innerText = `Target: ${USER_ID}`;
            checkRemoteStatus();
        }

        const lockBtn = document.getElementById('lockBtn');
        const unlockBtn = document.getElementById('unlockBtn');
        const pinInput = document.getElementById('pin');
        const message = document.getElementById('message');
        const loader = document.getElementById('loader');

        // Check if already locked
        async function checkRemoteStatus() {
            try {
                const res = await fetch(API_BASE);
                const allData = await res.json();
                
                // We check the specific sub-key for this USER_ID
                if (allData[USER_ID] && allData[USER_ID].status === 'LOCKED') {
                    setUILocked();
                }
            } catch (e) { console.error("Sync Error"); }
        }

        function setUILocked() {
            lockBtn.style.display = 'none';
            unlockBtn.style.display = 'flex';
            document.getElementById('title').innerText = "System Protected";
            document.getElementById('title').style.background = "linear-gradient(to right, #fff, #ff0055)";
            document.getElementById('title').style.webkitBackgroundClip = "text";
            document.getElementById('desc').innerText = "Target browser is currently locked. Enter correct PIN to release.";
            userBadge.style.borderColor = "#ff0055";
            userBadge.style.color = "#ff0055";
        }

        // Lock Remote Browser
        lockBtn.onclick = async () => {
            const pin = pinInput.value;
            if (pin.length !== 4) return showMsg("Enter 4-digit PIN", "#ffaa00");

            setLoading(true);
            try {
                // Fetch all data first to avoid overwriting others
                const res = await fetch(API_BASE);
                let allData = await res.json();
                
                // Update only this user's data
                allData[USER_ID] = { status: 'LOCKED', pin: pin };

                const update = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(allData)
                });

                if (update.ok) {
                    showMsg("✅ Remote Lock Active!", "#00ffaa");
                    setTimeout(() => location.reload(), 1500);
                }
            } catch (e) { showMsg("Error syncing data!", "#ff0055"); }
            finally { setLoading(false); }
        };

        // Unlock Remote Browser
        unlockBtn.onclick = async () => {
            const pin = pinInput.value;
            setLoading(true);
            try {
                const res = await fetch(API_BASE);
                let allData = await res.json();

                if (allData[USER_ID] && pin === allData[USER_ID].pin) {
                    allData[USER_ID] = { status: 'UNLOCKED', pin: "" };
                    
                    await fetch(API_BASE, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(allData)
                    });

                    showMsg("✅ System Released!", "#00ffaa");
                    setTimeout(() => location.reload(), 1500);
                } else {
                    showMsg("Invalid Authorization!", "#ff0055");
                    document.getElementById('card').style.animation = "shake 0.4s ease";
                    setTimeout(() => document.getElementById('card').style.animation = "", 400);
                }
            } catch (e) { showMsg("Sync Error!", "#ff0055"); }
            finally { setLoading(false); }
        };

        function showMsg(txt, color) {
            message.innerText = txt;
            message.style.color = color;
        }

        function setLoading(val) {
            loader.style.display = val ? 'block' : 'none';
            if (val) message.innerText = "";
        }

        pinInput.oninput = (e) => { e.target.value = e.target.value.replace(/[^0-9]/g, ''); };
    </script>
</body>
</html>
