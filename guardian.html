<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Guardian PIN</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #8b5cf6; }
        input {
            width: 100%;
            padding: 15px;
            font-size: 30px;
            text-align: center;
            background: #0f172a;
            border: 2px solid #334155;
            color: white;
            border-radius: 8px;
            margin: 15px 0;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #8b5cf6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .site-item {
            padding: 8px;
            background: #0f172a;
            margin: 5px 0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛡️ Guardian PIN</h1>
        <p>সাইট লিস্ট:</p>
        <div id="siteList"></div>
        
        <input type="text" id="pin" maxlength="4" placeholder="****">
        <button id="setPin">PIN সেট করুন</button>
        <div id="message"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        
        document.getElementById('setPin').onclick = () => {
            const pin = document.getElementById('pin').value;
            
            if (pin && pin.length === 4) {
                // এক্সটেনশনে পাঠানোর চেষ্টা
                if (typeof browser !== 'undefined') {
                    browser.runtime.sendMessage({
                        action: 'setPinFromWeb',
                        id: id,
                        pin: pin
                    }).then(() => {
                        document.getElementById('message').innerHTML = '✅ PIN সেট হয়েছে!';
                    });
                } else {
                    alert('PIN: ' + pin);
                    document.getElementById('message').innerHTML = '✅ PIN সংরক্ষিত!';
                }
            }
        };
        
        // শুধু নাম্বার
        document.getElementById('pin').oninput = (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        };
        
        // ডেমো সাইট
        document.getElementById('siteList').innerHTML = `
            <div class="site-item">facebook.com</div>
            <div class="site-item">youtube.com</div>
            <div class="site-item">twitter.com</div>
        `;
    </script>
</body>
</html>
