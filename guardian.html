<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Guardian PIN | Focus Pilot</title>
    <style>
        body { background: #0f172a; color: white; font-family: Arial; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #8b5cf6; margin-bottom: 10px; }
        input { width: 80%; padding: 15px; font-size: 30px; text-align: center; background: #0f172a; border: 2px solid #334155; color: white; border-radius: 8px; margin: 15px 0; letter-spacing: 10px; }
        button { width: 100%; padding: 15px; background: #8b5cf6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        #unlock-btn { background: #10b981; display: none; }
        #message { margin-top: 15px; font-weight: bold; }
        .loading { color: #fbbf24; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛡️ Guardian Mode</h1>
        <p id="instruction">Set a 4-digit PIN to LOCK your friend's browser.</p>
        
        <input type="password" id="pin" maxlength="4" placeholder="****">
        
        <button id="lockBtn">🔒 SET LOCK</button>
        <button id="unlockBtn">🔓 UNLOCK NOW</button>
        
        <div id="loading" class="loading">Processing... Please wait.</div>
        <div id="message"></div>
    </div>

    <script>
        const BIN_ID = '07fbb68e8699db5dc69f';
        const API_URL = `https://api.npoint.io/${BIN_ID}`;

        const lockBtn = document.getElementById('lockBtn');
        const unlockBtn = document.getElementById('unlockBtn');
        const pinInput = document.getElementById('pin');
        const message = document.getElementById('message');
        const loading = document.getElementById('loading');
        const instruction = document.getElementById('instruction');

        // ১. পেজ লোড হওয়ার সময় বর্তমান অবস্থা চেক করা (npoint থেকে)
        async function checkCurrentStatus() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                if (data.status === 'LOCKED') {
                    lockBtn.style.display = 'none';
                    unlockBtn.style.display = 'block';
                    instruction.innerText = "Target is currently LOCKED. Enter the PIN to unlock.";
                    instruction.style.color = "#ef4444";
                }
            } catch (e) { console.error("Error fetching status"); }
        }
        checkCurrentStatus();

        // ২. লক করার লজিক
        lockBtn.onclick = async () => {
            const pin = pinInput.value;
            if (pin.length !== 4) return alert("মামা, ৪ ডিজিটের পিন দাও!");

            loading.style.display = 'block';
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'LOCKED', pin: pin })
                });
                message.innerHTML = '✅ <span style="color:#ef4444;">BROWSER LOCKED!</span>';
                setTimeout(() => location.reload(), 1500);
            } catch (e) {
                alert("ফেল হইছে মামা! আবার ট্রাই কর।");
            } finally { loading.style.display = 'none'; }
        };

        // ৩. আনলক করার লজিক
        unlockBtn.onclick = async () => {
            const pin = pinInput.value;
            if (!pin) return alert("আনলক করতে পিনটা লাগবে মামা!");

            loading.style.display = 'block';
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                if (pin === data.pin) {
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: 'UNLOCKED', pin: "" })
                    });
                    message.innerHTML = '✅ <span style="color:#10b981;">UNLOCKED SUCCESSFULLY!</span>';
                    setTimeout(() => location.reload(), 1500);
                } else {
                    alert("ভুল পিন! মামাকে ধোঁকা দেওয়া যাবে না।");
                }
            } catch (e)) {
                alert("Error connecting to server!");
            } finally { loading.style.display = 'none'; }
        };

        // শুধু নাম্বার ইনপুট
        pinInput.oninput = (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        };
    </script>
</body>
</html>
